<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuickRun – Order Placed!</title>
<link rel="stylesheet" href="css/style.css">
<style>
.success-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  text-align: center;
  padding: 40px 28px;
}

.success-anim {
  width: 120px;
  height: 120px;
  background: linear-gradient(135deg, #f28c38, #d97420);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 52px;
  margin-bottom: 28px;
  animation: successPop 0.6s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow: 0 20px 40px rgba(242,140,56,0.35);
}

@keyframes successPop {
  from { transform: scale(0); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.success-title {
  font-family: 'Syne', sans-serif;
  font-size: 28px;
  font-weight: 800;
  color: var(--text);
  margin-bottom: 10px;
  animation: fadeUp 0.4s ease 0.3s both;
}

.success-sub {
  font-size: 15px;
  color: var(--text-muted);
  margin-bottom: 32px;
  line-height: 1.6;
  animation: fadeUp 0.4s ease 0.4s both;
}

.order-ref {
  background: var(--card);
  border-radius: 16px;
  padding: 16px 24px;
  margin-bottom: 32px;
  box-shadow: var(--shadow);
  animation: fadeUp 0.4s ease 0.5s both;
}

.order-ref .ref-label { font-size: 12px; color: var(--text-muted); }
.order-ref .ref-id { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; color: var(--orange); margin-top: 4px; }

.eta-bar {
  background: var(--orange-light);
  border-radius: 16px;
  padding: 16px 20px;
  margin-bottom: 32px;
  display: flex;
  align-items: center;
  gap: 12px;
  animation: fadeUp 0.4s ease 0.55s both;
  width: 100%;
}
.eta-bar .eta-icon { font-size: 28px; }
.eta-bar .eta-text { font-size: 13px; color: var(--text-muted); }
.eta-bar .eta-time { font-size: 18px; font-weight: 800; color: var(--orange); }

.btn-group {
  display: flex;
  flex-direction: column;
  gap: 10px;
  width: 100%;
  animation: fadeUp 0.4s ease 0.6s both;
}
</style>
</head>
<body>
<div class="phone">
  <div class="screen" >
    <div class="success-screen">

      <div class="success-anim">✓</div>

      <div class="success-title">Order Placed!</div>
      <div class="success-sub">Your delivery is confirmed and a rider will be assigned shortly.</div>

      <div class="order-ref">
        <div class="ref-label">Order Reference</div>
        <div class="ref-id" id="orderId">#QR000000</div>
      </div>

      <div class="eta-bar">
        <div class="eta-icon">🚴</div>
        <div>
          <div class="eta-text">Estimated Delivery</div>
          <div class="eta-time">15–30 minutes</div>
        </div>
      </div>

      <div class="btn-group">
        <button class="btn-primary ripple" onclick="window.location.href='orderdetail.html'">Track My Order →</button>
        <button class="btn-outline" onclick="window.location.href='dashboard.html'">Back to Home</button>
      </div>

    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script>
requireAuth();
const lastOrder = JSON.parse(sessionStorage.getItem('qr_last_order') || '{}');
if (lastOrder.id) document.getElementById('orderId').textContent = '#' + lastOrder.id;
</script>
</body>
</html>
